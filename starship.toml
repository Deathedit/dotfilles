"$schema" = 'https://starship.rs/config-schema.json'
palette = "noctalia"

format = "$username$hostname$directory"

[username]
show_always = true
format = '[$user]($style)'
disabled = false

[hostname]
ssh_only = false
format = "[$ssh_symbol](bold blue) on [$hostname](bold red) "
disabled = false

[directory]
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "~/"

[line_break]
disabled = true

[python]
format = 'via $symbol(${version})(($virtualenv))'
pyenv_version_name = true









































































































































































































































































































































































































































































































































