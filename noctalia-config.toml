[bar.default]
end = [ "tray", "group:g1", "notifications", "network", "volume", "control-center" ]
margin_edge = 4.0
margin_ends = 0.0
start = [ "workspaces" ]

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    id = "g1"
    members = [ "cpu", "temp", "ram" ]
    opacity = 0.0
    padding = 6.0

[control_center]
sidebar = "full"

    [[control_center.shortcuts]]
    type = "power_profile"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "session"

[desktop_widgets]
enabled = false
schema_version = 1
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
icon_size = 24

[location]
auto_locate = true

[lockscreen_widgets]
enabled = false
schema_version = 1
widget_order = [ "lockscreen-login-box@DP-2", "lockscreen-login-box@DP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    cx = 1720.0
    cy = 1317.0
    output = "DP-1"
    rotation = 0.0
    scale = 1.0
    type = "login_box"

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    cx = 1720.0
    cy = 1317.0
    output = "DP-2"
    rotation = 0.0
    scale = 1.0
    type = "login_box"

[osd]
lock_keys = false

[[plugins.source]]
auto_update = true
kind = "git"
location = "https://github.com/noctalia-dev/community-plugins"
name = "community"

[[plugins.source]]
auto_update = true
kind = "git"
location = "https://github.com/noctalia-dev/official-plugins"
name = "official"

[shell]
avatar_path = "/home/deathedit/.face/bbcd35d0ab7b40230723a5bf83323bcc.jpg"
polkit_agent = true

    [shell.mpris]
    blacklist = [ "firefox" ]

    [shell.panel]
    borders = false
    control_center_placement = "floating"
    launcher_categories = false
    session_placement = "centered"
    transparency_mode = "soft"
    wallpaper_placement = "centered"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "5"
    variant = "destructive"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock"
    enabled = false
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "suspend"
    enabled = false
    shortcut = "3"
    variant = "default"

[theme]
builtin = "Dracula"
source = "wallpaper"
wallpaper_scheme = "m3-fruit-salad"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "hyprland", "kcolorscheme", "kitty", "qt", "starship" ]
    community_ids = [ "neovim", "yazi" ]

[wallpaper]
directory = "/home/deathedit/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/deathedit/Pictures/Wallpapers/wallhaven-w55gjr.png"

    [wallpaper.last]
    path = "/home/deathedit/Pictures/Wallpapers/wallhaven-w55gjr.png"

    [wallpaper.monitors.DP-1]
    path = "/home/deathedit/Pictures/Wallpapers/wallhaven-w55gjr.png"

    [wallpaper.monitors.DP-2]
    path = "/home/deathedit/Pictures/Wallpapers/wallhaven-w55gjr.png"

[widget.battery]
device = "/org/freedesktop/UPower/devices/battery_hidpp_battery_0"
hide_when_full = true

[widget.bongocat]
audio_spectrum = true
input_device = ""
script = "scripts/bongocat.lua"
tappy_mode = true
type = "scripted"

[widget.control-center]
glyph = "hyprland"

[widget.cpu]
display = "text"
highlight_color = "on_surface"

[widget.network]
show_label = false

[widget.ram]
display = "text"
highlight_color = "on_surface"
stat = "ram_pct"

[widget.taskbar]
group_by_workspace = true

[widget.temp]
display = "text"
highlight_color = "on_surface"
show_label = false

[widget.volume]
show_label = false
